<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>就活手帳</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2E4B6B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="就活手帳">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F3EC;
  --surface:#FFFFFF;
  --surface-2:#FBF9F4;
  --ink:#2A2F3A;
  --ink-soft:#5C6472;
  --ink-faint:#9AA1AE;
  --navy:#2E4B6B;
  --navy-deep:#243B54;
  --green:#4F9D69;
  --green-bg:#E6F2EA;
  --pink:#DB7E9C;
  --pink-bg:#FBE9EF;
  --muted:#9AA1AE;
  --muted-bg:#ECEEF1;
  --red:#C75D5D;
  --red-bg:#F7E7E7;
  --yellow:#B8860B;
  --yellow-bg:#FBF1CC;
  --yellow-bd:#E8D27E;
  --blue:#5B7C99;
  --blue-bg:#E7EDF3;
  --blue-bd:#BCCEDD;
  --gold:#C7A05A;
  --line:#E7E2D7;
  --line-soft:#EFEBE2;
  --shadow:0 2px 10px rgba(42,47,58,.06);
  --shadow-lg:0 8px 30px rgba(42,47,58,.14);
  --radius:16px;
  --radius-sm:11px;
  --tabbar-h:62px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
/* タブごとの内容量差でスクロールバーが出入りしても幅が変わらないようにする（ボトムタブの横ずれ防止） */
html{scrollbar-gutter:stable}
body{
  font-family:"Noto Sans JP",system-ui,sans-serif;
  background:var(--bg);
  color:var(--ink);
  font-size:15px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
input,select,textarea{outline:none}
h1,h2,h3,h4{font-family:"Zen Maru Gothic",sans-serif;margin:0;font-weight:700}
.zen{font-family:"Zen Maru Gothic",sans-serif}

/* shell */
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:calc(var(--tabbar-h) + env(safe-area-inset-bottom));overflow-x:hidden}
.screen{display:none;animation:fade .25s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* topbar */
.topbar{position:sticky;top:0;z-index:30;background:var(--bg);padding:18px 18px 12px;display:flex;align-items:center;gap:10px}
.topbar .title{font-size:23px;font-weight:900;letter-spacing:.02em;flex:1}
.topbar .sub{font-size:12px;color:var(--ink-faint);font-weight:500;margin-top:2px}
.iconbtn{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;background:var(--surface);box-shadow:var(--shadow);color:var(--navy);flex:none}
.iconbtn:active{transform:scale(.94)}
.iconbtn svg{width:20px;height:20px}
.iconbtn.on{background:var(--navy);color:#fff}
/* 企業名検索バー */
.searchbar{padding:0 18px 6px;max-height:0;overflow:hidden;opacity:0;transition:max-height .22s ease,opacity .18s ease,padding .22s ease}
.searchbar.open{max-height:70px;opacity:1;padding:2px 18px 10px}
.searchbar .searchwrap{display:flex;align-items:center;gap:6px;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:0 10px;box-shadow:var(--shadow)}
.searchbar .searchwrap>svg{width:16px;height:16px;color:var(--ink-faint);flex:none}
.searchbar input{flex:1;min-width:0;border:none;background:transparent;padding:10px 4px;font-size:14px;font-weight:600;color:var(--ink);font-family:inherit}
.searchbar input:focus{outline:none}
.searchbar .clr{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;color:var(--ink-faint);flex:none}
.searchbar .clr svg{width:15px;height:15px}
.backbtn{display:flex;align-items:center;gap:4px;color:var(--navy);font-weight:700;font-size:15px;padding:6px 6px 6px 0}
.backbtn svg{width:20px;height:20px}

.pad{padding:0 16px}
.section-h{font-size:14px;font-weight:700;color:var(--ink-soft);margin:22px 4px 10px;display:flex;align-items:center;gap:7px}
.section-h .dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
.section-h .count{color:var(--ink-faint);font-weight:500;font-size:12px}

/* calendar */
.cal-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 12px 12px;margin:0 16px;overflow:hidden}
.cal-head{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:12px}
.cal-nav{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:var(--navy)}
.cal-nav:active{background:var(--surface-2)}
.cal-nav svg{width:18px;height:18px}
.cal-ym{font-family:"Zen Maru Gothic";font-weight:700;font-size:18px;padding:5px 12px;border-radius:10px;min-width:128px;text-align:center}
.cal-ym:active{background:var(--surface-2)}
.cal-ym .yr{font-size:12px;color:var(--ink-faint);font-weight:500;display:block;line-height:1}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}
.cal-wd{text-align:center;font-size:11px;font-weight:700;color:var(--ink-faint);padding:4px 0 6px}
.cal-wd.sun{color:var(--red)}
.cal-wd.sat{color:var(--navy)}
.cal-cell{min-height:62px;border-top:1px solid var(--line-soft);padding:3px 2px 2px;position:relative;display:flex;flex-direction:column;gap:1px;overflow:visible}
.cal-cell .dnum{font-size:12px;font-weight:700;color:var(--ink-soft);text-align:center;width:20px;height:20px;line-height:20px;margin:0 auto;border-radius:50%}
.cal-cell.out .dnum{color:var(--ink-faint);opacity:.45}
.cal-cell.sun .dnum{color:var(--red)}
.cal-cell.sat .dnum{color:var(--navy)}
.cal-cell.today .dnum{background:var(--navy);color:#fff}
.cal-cell.today{background:linear-gradient(180deg,rgba(46,75,107,.07),transparent)}
.cal-ev{font-size:9px;line-height:1.25;border-radius:4px;padding:1px 3px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;height:14px;box-sizing:border-box;pointer-events:none}
.cal-ev.label-span{overflow:visible;text-overflow:clip;position:relative;z-index:5}
.cal-lane-empty{height:14px}
.cal-ev.point{background:var(--gold);color:#fff}
.cal-ev.span{background:var(--green);color:#fff;border-radius:0;margin-left:-2px;margin-right:-2px}
.cal-ev.span.s{border-top-left-radius:5px;border-bottom-left-radius:5px;margin-left:1px}
.cal-ev.span.e{border-top-right-radius:5px;border-bottom-right-radius:5px;margin-right:1px}
.cal-ev.span.mid{}
.cal-ev.done{opacity:.4;text-decoration:line-through}
.cal-ev.point.event{background:var(--pink)}
.cal-ev.span.event{background:var(--pink)}
.cal-more{font-size:8px;color:var(--ink-faint);font-weight:700;text-align:center}

/* segmented / chips */
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.seg{display:inline-flex;background:var(--muted-bg);border-radius:11px;padding:3px}
.seg button{padding:6px 13px;border-radius:8px;font-size:13px;font-weight:700;color:var(--ink-soft)}
.seg button.on{background:var(--surface);color:var(--navy);box-shadow:var(--shadow)}
.selbox{position:relative}
.sel{appearance:none;-webkit-appearance:none;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:8px 30px 8px 12px;font-size:13px;font-weight:700;color:var(--ink);box-shadow:var(--shadow)}
.selbox::after{content:"";position:absolute;right:11px;top:50%;width:7px;height:7px;border-right:2px solid var(--ink-faint);border-bottom:2px solid var(--ink-faint);transform:translateY(-70%) rotate(45deg);pointer-events:none}
.chip{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;background:var(--surface);border:1px solid var(--line);color:var(--ink-soft);box-shadow:var(--shadow)}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.cfilter{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px}
.cfilter-label{font-size:11.5px;font-weight:700;color:var(--ink-faint);margin:2px 2px 6px}

/* task list */
.task{background:var(--surface);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:11px}
.task .cb{flex:none;margin-top:1px}
.cb{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);background:var(--surface);display:grid;place-items:center;transition:.15s}
.cb svg{width:13px;height:13px;opacity:0;color:#fff}
.cb.on{background:var(--green);border-color:var(--green)}
.cb.on svg{opacity:1}
.task .body{flex:1;min-width:0}
.task .tname{font-weight:700;font-size:14.5px;line-height:1.4}
.task.checked .tname{text-decoration:line-through;color:var(--ink-faint)}
.task .meta{font-size:11.5px;color:var(--ink-faint);margin-top:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.task .co{font-weight:700;color:var(--navy)}
.task .due-near{color:var(--red);font-weight:700}
.task .editbtn{flex:none;color:var(--ink-faint);width:30px;height:30px;border-radius:8px;display:grid;place-items:center}
.task .editbtn:active{background:var(--surface-2)}
.task .editbtn svg{width:16px;height:16px}
.task.is-event{border-left:3px solid var(--pink)}
.task .ev-mark{flex:none;font-size:15px;line-height:1.5;margin-top:1px}
.co-chip{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:var(--surface-2);border:1px solid var(--line-soft);border-radius:9px;padding:5px 9px;font-size:12px;font-weight:700;color:var(--navy)}
.co-chip:active{background:var(--line-soft)}
.co-chip .dt-dot{width:7px;height:7px;border-radius:50%;background:var(--navy);flex:none}
.co-chip .dt-cochev{width:13px;height:13px;opacity:.55;flex:none}
.t-memo{font-size:12px;color:var(--ink-soft);margin-top:6px;white-space:pre-wrap;background:var(--surface-2);border-radius:8px;padding:6px 9px;line-height:1.55}
.tflag{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px;vertical-align:middle;margin-right:3px}
.tflag.ev{background:var(--pink-bg);color:var(--pink)}
.dt-memo{font-size:12px;color:var(--ink-soft);margin-top:6px;background:var(--surface-2);border-radius:8px;padding:6px 9px;white-space:pre-wrap;line-height:1.55}
.track-memo{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;background:var(--surface);min-height:66px;font-family:inherit;font-size:14px;line-height:1.6;resize:vertical}
.task-memo{min-height:62px;resize:vertical}

.empty{text-align:center;color:var(--ink-faint);font-size:13px;padding:26px 16px;background:var(--surface);border-radius:var(--radius-sm);box-shadow:var(--shadow);font-weight:500}
.empty .em{font-size:24px;display:block;margin-bottom:6px}

/* company list */
.co-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 15px;margin-bottom:10px}
.co-card:active{transform:scale(.99)}
.co-top{display:flex;align-items:flex-start;gap:10px}
.co-name{font-family:"Zen Maru Gothic";font-weight:900;font-size:19px;line-height:1.25;flex:1;min-width:0}
.co-asp{flex:none;font-size:12px;color:var(--gold);letter-spacing:1px;white-space:nowrap;margin-top:3px}
.co-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:9px}
.badge{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap}
.badge.green{background:var(--green-bg);color:var(--green)}
.badge.pink{background:var(--pink-bg);color:var(--pink)}
.badge.muted{background:var(--muted-bg);color:var(--muted)}
.badge.red{background:var(--red-bg);color:var(--red)}
.badge.yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bd)}
.badge.blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.badge.ind{background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--line)}
.co-mypage{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line-soft);font-size:12px;color:var(--ink-soft)}
.co-mypage .lbl{font-weight:700;color:var(--ink-faint)}
.co-mypage .val{font-family:ui-monospace,monospace;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copybtn{flex:none;display:flex;align-items:center;gap:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:4px 9px;font-size:11px;font-weight:700;color:var(--navy)}
.copybtn:active{background:var(--muted-bg)}
.copybtn svg{width:13px;height:13px}
.copybtn.ok{background:var(--green-bg);color:var(--green);border-color:var(--green-bg)}

.fab-add{width:100%;border:2px dashed var(--line);border-radius:var(--radius-sm);padding:13px;color:var(--navy);font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--surface-2)}
.fab-add:active{background:var(--surface)}
.fab-add svg{width:18px;height:18px}
.add-sm{font-size:13px;color:var(--navy);font-weight:700;padding:9px;display:flex;align-items:center;justify-content:center;gap:5px;border:1.5px dashed var(--line);border-radius:10px;width:100%;background:var(--surface-2);margin-top:8px}
.add-sm:active{background:var(--surface)}
.add-sm svg{width:15px;height:15px}

/* detail */
.detail-hero{background:linear-gradient(135deg,var(--navy),var(--navy-deep));color:#fff;border-radius:var(--radius);padding:18px;margin:0 16px;box-shadow:var(--shadow-lg)}
.detail-hero .dname{font-family:"Zen Maru Gothic";font-weight:900;font-size:24px;line-height:1.2}
.detail-hero .dind{font-size:12.5px;opacity:.8;margin-top:5px;font-weight:500}
.detail-hero .dasp{color:#F2C97A;font-size:14px;letter-spacing:2px;margin-top:8px}
.detail-hero .dmypage{display:flex;align-items:center;gap:7px;margin-top:13px;background:rgba(255,255,255,.12);border-radius:10px;padding:8px 10px;font-size:12px}
.detail-hero .dmypage .val{flex:1;font-family:ui-monospace,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.detail-hero .copybtn{background:rgba(255,255,255,.18);border-color:transparent;color:#fff}
.detail-hero .copybtn.ok{background:var(--green);color:#fff}

.statusbox{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin:14px 16px 0}
.statusbox .lbl{font-size:11.5px;font-weight:700;color:var(--ink-faint);margin-bottom:6px}
.statusbox .field{margin-bottom:12px}
.statusbox .field:last-child{margin-bottom:0}
.bigsel{width:100%;appearance:none;-webkit-appearance:none;border:1.5px solid var(--line);border-radius:11px;padding:11px 34px 11px 13px;font-weight:700;font-size:15px;background:var(--surface-2)}
.bigsel.green{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.bigsel.pink{background:var(--pink-bg);border-color:var(--pink);color:var(--pink)}
.bigsel.muted{background:var(--muted-bg);border-color:var(--line);color:var(--ink-soft)}
.bigsel.red{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.bigsel.yellow{background:var(--yellow-bg);border-color:var(--yellow-bd);color:var(--yellow)}
.bigsel.blue{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue)}
.selbox.full{display:block}
.selbox.full::after{right:14px}

/* ES / interview record cards */
.rec{background:var(--surface);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:13px 14px;margin-bottom:9px}
.rec-top{display:flex;align-items:flex-start;gap:9px}
.star{flex:none;width:26px;height:26px;display:grid;place-items:center;color:var(--line)}
.star svg{width:22px;height:22px}
.star.on{color:var(--gold)}
.rec .rtitle{font-weight:700;font-size:15px;flex:1;line-height:1.35}
.rec .rmeta{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px;align-items:center}
.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:14px;background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--line)}
.tag.genre{background:var(--navy);color:#fff;border-color:var(--navy)}
.tag.cnt{background:var(--gold);color:#fff;border-color:var(--gold)}
.tag.date{background:transparent;color:var(--ink-faint);border:none;padding-left:0}
.rec .rbody{font-size:13px;color:var(--ink-soft);margin-top:9px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.rec .rbody.clamp{display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;overflow:hidden}
.rec .expand{font-size:12px;color:var(--navy);font-weight:700;margin-top:6px}
.rbody-actions{display:flex;align-items:center;gap:14px;margin-top:6px}
.rbody-actions .expand{margin-top:0}
.rec .copybody{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--navy);font-weight:700}
.rec .copybody svg{width:14px;height:14px}
.rec .copybody.ok{color:var(--green)}
.rec .audio{margin-top:9px}
.rec audio{width:100%;height:38px}
.rec .rco{font-size:11.5px;font-weight:700;color:var(--navy);margin-bottom:5px}
.rec .for-pass{font-size:11px;font-weight:700}
.rec .pass-y{color:var(--green)}
.rec .pass-w{color:var(--yellow)}
.rec .pass-n{color:var(--red)}
/* 3択：通過可否セレクタ */
.passseg{display:flex;gap:6px}
.passseg button{flex:1;padding:10px 4px;border-radius:10px;font-size:13px;font-weight:700;background:var(--surface);border:1.5px solid var(--line);color:var(--ink-soft);white-space:nowrap}
.passseg button.on.p-pass{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.passseg button.on.p-wait{background:var(--yellow-bg);border-color:var(--yellow-bd);color:var(--yellow)}
.passseg button.on.p-fail{background:var(--red-bg);border-color:var(--red);color:var(--red)}

/* tabbar */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(var(--tabbar-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;z-index:40}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--ink-faint);font-size:10.5px;font-weight:700;padding-top:8px}
.tabbar button svg{width:23px;height:23px}
.tabbar button.on{color:var(--navy)}
.tabbar button.on .tbdot{opacity:1}
.tbdot{width:4px;height:4px;border-radius:50%;background:var(--navy);opacity:0;transition:.2s}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(36,40,50,.45);z-index:60;display:none;align-items:flex-end;justify-content:center;animation:fade .2s}
.modal-bg.show{display:flex}
.modal{background:var(--bg);width:100%;max-width:480px;border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;animation:slideup .28s cubic-bezier(.2,.8,.2,1);padding-bottom:calc(20px + env(safe-area-inset-bottom))}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.modal-grab{width:38px;height:4px;border-radius:3px;background:var(--line);margin:9px auto 4px}
.modal-h{display:flex;align-items:center;padding:8px 18px 14px;gap:10px}
.modal-h .mt{font-family:"Zen Maru Gothic";font-weight:900;font-size:19px;flex:1}
.modal-x{font-size:14px;font-weight:700;color:var(--ink-faint);padding:4px 8px}
/* ES・面接フォーム用：左に閉じる・右に追加/保存（スクロールしても固定） */
.modal-h-3{position:sticky;top:0;z-index:5;background:var(--bg);border-bottom:1px solid var(--line-soft);padding:12px 14px;gap:8px}
.modal-h-3 .mt{flex:1;text-align:center;font-size:17px}
.modal-h-3 .hdr-close{font-size:14px;font-weight:700;color:var(--ink-soft);padding:8px 6px;white-space:nowrap}
.modal-h-3 .hdr-save{font-size:14px;font-weight:800;color:#fff;background:var(--navy);border-radius:10px;padding:8px 16px;white-space:nowrap;box-shadow:var(--shadow)}
.modal-h-3 .hdr-save:active{transform:scale(.96)}
.modal.has-hdr-actions .modal-grab{display:none}
.chip.chip-add{border-style:dashed;color:var(--navy)}
.modal-body{padding:0 18px}
.fld{margin-bottom:15px}
.fld label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:6px}
.fld label .opt{color:var(--ink-faint);font-weight:500}
.fld input[type=text],.fld input[type=date],.fld input[type=datetime-local],.fld textarea,.fld select{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;background:var(--surface)}
.fld select{appearance:none;-webkit-appearance:none;padding-right:34px}
.fld textarea{resize:vertical;line-height:1.7;min-height:230px}
.fld .selwrap{position:relative}
.fld .selwrap::after{content:"";position:absolute;right:14px;top:22px;width:7px;height:7px;border-right:2px solid var(--ink-faint);border-bottom:2px solid var(--ink-faint);transform:rotate(45deg);pointer-events:none}
.fld .cnt{font-size:11px;color:var(--ink-faint);text-align:right;margin-top:4px;font-weight:700}
.asp-pick{display:flex;gap:6px}
.asp-pick button{flex:1;height:42px;border-radius:11px;border:1.5px solid var(--line);font-size:18px;color:var(--line);background:var(--surface)}
.asp-pick button.on{color:var(--gold);border-color:var(--gold);background:#FCF6EA}
.savebtn{width:100%;background:var(--navy);color:#fff;font-weight:700;font-size:16px;padding:14px;border-radius:13px;margin-top:6px}
.savebtn:active{background:var(--navy-deep)}
.delbtn{width:100%;color:var(--red);font-weight:700;font-size:14px;padding:12px;margin-top:9px;border-radius:11px;background:var(--red-bg)}
.starpick{display:flex;align-items:center;gap:6px}
.starpick button{color:var(--line)}
.starpick button.on{color:var(--gold)}
.starpick svg{width:30px;height:30px}
.inline-add{display:flex;gap:7px;margin-top:8px}
.inline-add input{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;background:var(--surface)}
.inline-add button{background:var(--navy);color:#fff;border-radius:10px;padding:0 16px;font-weight:700}
.optlist{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.optlist .o{display:flex;align-items:center;gap:6px;font-size:13px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:6px 7px 6px 12px;font-weight:700}
.optlist .o .nm{flex:1;min-width:0}
.optlist .o .mv{width:30px;height:30px;border-radius:8px;background:var(--surface-2);color:var(--ink-soft);display:grid;place-items:center}
.optlist .o .mv svg{width:16px;height:16px}
.optlist .o .mv:disabled{opacity:.28}
.optlist .o .mv:not(:disabled):active{background:var(--line)}
.optlist .o .del{width:30px;height:30px;border-radius:8px;color:var(--red);background:var(--red-bg);font-size:16px;line-height:1;display:grid;place-items:center}
.optlist .o .clr{width:30px;height:30px;border-radius:8px;background:var(--surface-2);display:grid;place-items:center;flex:none;border:1px solid var(--line)}
.optlist .o .clr .sw{width:16px;height:16px;border-radius:50%;border:1.5px solid rgba(0,0,0,.12)}
.optlist .o .clr .sw.auto{background:conic-gradient(var(--green),var(--yellow),var(--red),var(--blue),var(--green));position:relative}
.clr-picker{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.clr-picker .co{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--ink-soft);width:58px}
.clr-picker .co .sw{width:34px;height:34px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center}
.clr-picker .co.on .sw{border-color:var(--navy);box-shadow:0 0 0 2px var(--navy)}
.clr-picker .co .sw.auto{background:conic-gradient(var(--green),var(--yellow),var(--red),var(--blue),var(--green))}
.clr-picker .co .sw.chk{color:var(--navy);font-weight:900;font-size:16px}
.toast{position:fixed;bottom:calc(var(--tabbar-h) + 18px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:22px;font-size:13px;font-weight:700;z-index:80;opacity:0;transition:.25s;pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.filewrap{border:1.5px dashed var(--line);border-radius:11px;padding:13px;text-align:center;background:var(--surface-2);font-size:13px;font-weight:700;color:var(--navy)}
.filewrap input{display:none}
.audio-attached{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;font-weight:700;color:var(--ink-soft)}
.hint{font-size:11px;color:var(--ink-faint);font-weight:500;margin-top:5px;line-height:1.5}
.divider{height:1px;background:var(--line-soft);margin:16px 0}
/* ===== 文字サイズ（小・中・大） 中=変更なし ===== */
/* モーダル・トーストは両レイアウト共通でスケール */
body.fs-s #modal-bg, body.fs-s #toast{ zoom:.9 }
body.fs-l #modal-bg, body.fs-l #toast{ zoom:1.12 }
/* スマホ版：画面とボトムタブをスケール（ページ全体が伸縮） */
body:not(.pc).fs-s .screen, body:not(.pc).fs-s .tabbar{ zoom:.9 }
body:not(.pc).fs-l .screen, body:not(.pc).fs-l .tabbar{ zoom:1.12 }
/* PC版：固定シェルは保ち、各ペインの中身だけスケール（はみ出さないよう左列幅も調整） */
body.pc.fs-s #top-tabs, body.pc.fs-s #pc-left > *, body.pc.fs-s .screen > *{ zoom:.9 }
body.pc.fs-l #top-tabs, body.pc.fs-l #pc-left > *, body.pc.fs-l .screen > *{ zoom:1.12 }
body.pc.fs-s #app{ grid-template-columns:345px 1fr }
body.pc.fs-l #app{ grid-template-columns:430px 1fr }
body.pc #pc-left{ overflow:auto }
body.pc #screen-A .topbar #btn-settings{ display:none }
/* 文字サイズを変えてもサイズを固定する枠：カレンダー / 設定ポップアップ */
body:not(.pc).fs-l #cal-mount{ zoom:.8929 }
body:not(.pc).fs-s #cal-mount{ zoom:1.1111 }
body.pc.fs-l #cal-mount{ zoom:1 }
body.pc.fs-s #cal-mount{ zoom:1 }
body.fs-l #modal-bg .modal.fixedsize{ zoom:.8929 }
body.fs-s #modal-bg .modal.fixedsize{ zoom:1.1111 }
/* cloud sync */
.cloud-row{display:flex;align-items:center;gap:8px}
.cloud-status{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:4px 11px;border-radius:16px;background:var(--surface-2);color:var(--ink-soft)}
.cloud-status::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--ink-faint)}
.cloud-status.on{background:var(--green-bg);color:var(--green)}
.cloud-status.on::before{background:var(--green)}
.cloud-status.connecting{background:#fdf3e2;color:#b07d1d}
.cloud-status.connecting::before{background:#e0a52b}
.cloud-status.error{background:var(--red-bg);color:var(--red)}
.cloud-status.error::before{background:var(--red)}
.cl-actions{margin-top:6px}
.cl-actions .btn-primary{width:100%;background:var(--navy);color:#fff;font-weight:700;border-radius:12px;padding:13px;font-size:15px}
.cl-actions .btn-primary:active{transform:scale(.99)}
.cl-help{margin-top:4px;font-size:12.5px;color:var(--ink-soft)}
.cl-help summary{font-weight:700;cursor:pointer;padding:6px 0}
.cl-help ol{margin:6px 0 10px;padding-left:20px;line-height:1.8}
.cl-help a{color:var(--navy);font-weight:700}
.cl-help code{background:var(--surface-2);padding:1px 5px;border-radius:5px;font-size:12px}
.cl-rules{background:#2b2f37;color:#e6e9ef;border-radius:10px;padding:11px;font-size:11px;line-height:1.5;overflow:auto;white-space:pre}

/* ===== PC版（上部タブ＋2カラム） ===== */
#top-tabs{display:none}
#pc-left{display:none}
body.pc{overflow:hidden}
body.pc #app{max-width:1180px;height:100vh;display:grid;grid-template-columns:380px 1fr;grid-template-rows:auto 1fr;grid-template-areas:"top top" "left right";column-gap:24px;padding:0 22px;overflow:hidden}
body.pc .tabbar{display:none}
body.pc #top-tabs{grid-area:top;display:flex;align-items:center;gap:6px;z-index:50;background:var(--bg);padding:16px 2px 12px;border-bottom:1px solid var(--line)}
body.pc #top-tabs .tt-brand{font-family:"Zen Maru Gothic",sans-serif;font-weight:900;font-size:18px;color:var(--navy);margin-right:14px;white-space:nowrap}
body.pc #top-tabs .tt-btn{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:11px;font-size:14px;font-weight:700;color:var(--ink-soft)}
body.pc #top-tabs .tt-btn svg{width:18px;height:18px}
body.pc #top-tabs .tt-btn.on{background:var(--navy);color:#fff;box-shadow:var(--shadow)}
body.pc #top-tabs .tt-spacer{flex:1}
body.pc #top-tabs .tt-gear{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:var(--ink-soft);background:var(--surface);border:1px solid var(--line)}
body.pc #top-tabs .tt-gear svg{width:19px;height:19px}
/* 左カラム（カレンダー常設）：右の内容に依存せず位置固定、必要時のみ自分でスクロール */
body.pc #pc-left{grid-area:left;display:block;min-height:0;overflow-y:auto;padding:16px 0 24px}
body.pc #pc-left .pc-left-head{display:flex;align-items:center;gap:8px;font-family:"Zen Maru Gothic",sans-serif;font-weight:700;font-size:15px;color:var(--ink-soft);margin:0 4px 10px}
body.pc #pc-left .pc-left-head .dot{width:8px;height:8px;border-radius:50%;background:var(--navy);display:inline-block}
/* 右カラム：選択タブの内容のみ内部スクロール（左カレンダーは動かない） */
body.pc .screen{grid-area:right;animation:none;min-height:0;overflow-y:auto;padding-bottom:28px}
body.pc .screen .topbar{position:sticky;top:0;z-index:5;background:var(--bg);padding:14px 2px 10px}
body.pc #cal-mount .cal-card{margin:0}
/* PC版：カレンダー下に表示する日詳細パネル */
body.pc #pc-day{margin-top:14px}
body.pc #pc-day:empty{display:none}
body.pc .pc-day-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}
body.pc .pc-day-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
body.pc .pc-day-head .mt{flex:1;font-family:"Zen Maru Gothic",sans-serif;font-weight:700;font-size:16px}
body.pc .pc-day-x{width:30px;height:30px;border-radius:9px;background:var(--surface-2);color:var(--ink-soft);font-size:14px;display:grid;place-items:center}
body.pc .pc-day-x:active{background:var(--line)}

/* ===== 日付セルのタップ & 日詳細ポップアップ ===== */
.cal-cell{cursor:pointer;transition:background .12s}
.cal-cell:hover{background:rgba(46,75,107,.05)}
.cal-cell:active{background:rgba(46,75,107,.1)}
.today-pill{font-family:"Noto Sans JP",sans-serif;font-size:11px;font-weight:700;color:#fff;background:var(--navy);padding:2px 9px;border-radius:20px;vertical-align:2px;margin-left:6px}
.day-tasks{display:flex;flex-direction:column;gap:9px}
.day-task{display:grid;grid-template-columns:1fr auto;align-items:stretch;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:6px;box-shadow:var(--shadow)}
.day-task.done{opacity:.6}
.dt-task{grid-column:1;text-align:left;border-radius:9px;padding:7px 9px;transition:background .12s}
.dt-task:hover{background:var(--surface-2)}
.dt-task:active{transform:scale(.99)}
.dt-task .dt-name{font-size:15.5px;font-weight:700;color:var(--ink);line-height:1.35}
.day-task.done .dt-task .dt-name{text-decoration:line-through;color:var(--ink-soft)}
.dt-task .dt-due{font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-top:2px}
.dt-task .dt-due.over{color:var(--red)}
.dt-co{grid-column:2;display:flex;align-items:center;gap:5px;align-self:stretch;border-radius:9px;padding:0 11px;background:var(--surface-2);border:1px solid var(--line-soft);font-size:12.5px;font-weight:700;color:var(--navy);white-space:nowrap;transition:background .12s,border-color .12s}
.dt-co:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.dt-co:hover .dt-dot{background:#fff}
.dt-co:active{transform:scale(.97)}
.dt-co .dt-dot{width:8px;height:8px;border-radius:50%;background:var(--navy);display:inline-block;flex:none}
.dt-co .dt-cochev{width:15px;height:15px;flex:none;opacity:.7}
</style>
</head>

<script>
/* ============ 就活手帳 app ============ */
(function(){
'use strict';

/* ---------- helpers ---------- */
const $  = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>Array.from(r.querySelectorAll(s));
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const WD = ['日','月','火','水','木','金','土'];

function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1800); }

/* ---------- storage ---------- */
const KEY='shukatsu-data-v1';
// claude.ai内ではwindow.storage、ダウンロードして自分のブラウザで開いた場合はlocalStorageを使う
const hasWinStore = (typeof window!=='undefined' && window.storage && typeof window.storage.get==='function');
const Store={
  async load(){
    if(hasWinStore){
      try{ const r=await window.storage.get(KEY); if(r&&r.value) return JSON.parse(r.value); }catch(e){}
    }
    try{ const raw=localStorage.getItem(KEY); return raw?JSON.parse(raw):null; }catch(e){ return null; }
  },
  async save(d){
    let json; try{ json=JSON.stringify(d); }catch(e){ return; }
    // 端末内(localStorage)には常にバックアップ保存
    try{ localStorage.setItem(KEY, json); }catch(e){}
    if(hasWinStore){
      try{ await window.storage.set(KEY, json, false); }
      catch(e){
        try{ await new Promise(r=>setTimeout(r,600)); await window.storage.set(KEY, json, false); }
        catch(e2){ /* localStorageに保存済みのため致命的ではない */ }
      }
    }
  }
};
let saveTimer=null;
function persist(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ Store.save(state); if(Cloud.enabled) Cloud.push(); },250); }

/* ---------- state migration (defaults) ---------- */
function migrate(s){
  s=s||{};
  s.settings=s.settings||{};
  s.settings.weekStart=s.settings.weekStart||'sun';
  s.settings.layoutMode=s.settings.layoutMode||'auto';
  s.settings.defaultTrack=s.settings.defaultTrack||'main';
  s.settings.fontSize=s.settings.fontSize||'m';
  s.settings.statusOptions=s.settings.statusOptions||[...DEFAULT_STATUS];
  s.settings.resultOptions=s.settings.resultOptions||[...DEFAULT_RESULT];
  if(s.settings.resultOptions.indexOf('結果待ち')<0) s.settings.resultOptions.unshift('結果待ち');
  s.settings.industries=s.settings.industries||[...DEFAULT_IND];
  s.settings.genres=s.settings.genres||[...DEFAULT_GENRE];
  s.settings.optionColors=s.settings.optionColors||{};
  ['statusOptions','resultOptions','industries','genres'].forEach(k=>{ s.settings.optionColors[k]=s.settings.optionColors[k]||{}; });
  s.companies=(s.companies||[]).map(c=>{
    const co={tracks:{main:{status:'未着手',result:''},intern:{status:'未着手',result:''}},tasks:[],es:[],interviews:[],...c};
    ['main','intern'].forEach(k=>{ co.tracks[k]=co.tracks[k]||{status:'未着手',result:''}; if(typeof co.tracks[k].memo!=='string') co.tracks[k].memo=''; });
    co.tasks=(co.tasks||[]).map(t=>({type:'task',memo:'',...t}));
    co.es=(co.es||[]).map(e=>{
      const ne={...e};
      if(!Array.isArray(ne.genres)) ne.genres = ne.genre? [ne.genre] : [];
      return ne;
    });
    return co;
  });
  return s;
}

/* ---------- cloud realtime sync (Firebase Firestore) ---------- */
const CFG_KEY='shukatsu-cloud-cfg', CODE_KEY='shukatsu-cloud-code', ON_KEY='shukatsu-cloud-on';
const SDK_BASE='https://www.gstatic.com/firebasejs/10.12.5/';
const Cloud={
  enabled:false, app:null, db:null, docRef:null, unsub:null, origin:Math.random().toString(36).slice(2),
  status:'off', statusMsg:'未設定', _t:null,
  cfg(){ try{ return JSON.parse(localStorage.getItem(CFG_KEY)||'null'); }catch(e){ return null; } },
  code(){ return localStorage.getItem(CODE_KEY)||''; },
  setStatus(s,msg){ this.status=s; this.statusMsg=msg; const el=document.getElementById('cloud-status'); if(el){ el.textContent=msg; el.className='cloud-status '+s; } },
  loadSDK(){
    return new Promise((res,rej)=>{
      if(window.firebase && firebase.firestore){ res(); return; }
      const files=['firebase-app-compat.js','firebase-auth-compat.js','firebase-firestore-compat.js'];
      let i=0;
      const next=()=>{ if(i>=files.length){ res(); return; } const sc=document.createElement('script'); sc.src=SDK_BASE+files[i++]; sc.onload=next; sc.onerror=()=>rej(new Error('Firebaseの読み込みに失敗しました（ネット接続をご確認ください）')); document.head.appendChild(sc); };
      next();
    });
  },
  async start(opts){
    opts=opts||{};
    const cfg=this.cfg(), code=this.code();
    if(!cfg||!code){ this.setStatus('off','未設定'); return; }
    try{
      this.setStatus('connecting','接続中…');
      await this.loadSDK();
      if(!this.app){ this.app=firebase.initializeApp(cfg); }
      await firebase.auth().signInAnonymously();
      this.db=firebase.firestore();
      this.docRef=this.db.collection('shukatsu').doc(code);
      // 初回リンク時：クラウド側にデータがあれば取り込み/上書きを選択
      if(opts.firstLink){
        const snap=await this.docRef.get();
        if(snap.exists && snap.data() && snap.data().data){
          const pull=confirm('クラウドに保存済みのデータが見つかりました。\n\n［OK］クラウドのデータをこの端末に取り込む\n［キャンセル］この端末のデータでクラウドを上書きする');
          if(pull){ applyRemoteState(JSON.parse(snap.data().data)); }
          else { await this._write(); }
        } else {
          await this._write();
        }
      }
      this.enabled=true; localStorage.setItem(ON_KEY,'1');
      if(this.unsub) this.unsub();
      this.unsub=this.docRef.onSnapshot(snap=>{
        if(!snap.exists) return;
        if(snap.metadata.hasPendingWrites) return; // 自分の書き込みは無視
        const d=snap.data(); if(!d||!d.data) return;
        if(d.origin===this.origin) return;
        try{ if(d.data!==JSON.stringify(state)) applyRemoteState(JSON.parse(d.data)); }catch(e){}
        this.setStatus('on','同期中（最終受信 '+nowHM()+'）');
      }, err=>{ this.setStatus('error','同期エラー: '+(err&&err.code||err.message||err)); });
      this.setStatus('on','同期中');
      if(opts.toast) toast('クラウド同期を開始しました');
    }catch(e){
      this.enabled=false; this.setStatus('error','接続失敗: '+(e&&e.message||e));
      if(opts.toast) toast('接続に失敗しました');
    }
  },
  async _write(){
    if(!this.docRef) return;
    try{ await this.docRef.set({ data:JSON.stringify(stripForCloud(state)), origin:this.origin, updatedAt:Date.now() }); }
    catch(e){ this.setStatus('error','保存エラー: '+(e&&e.code||e.message||e)); }
  },
  push(){ clearTimeout(this._t); this._t=setTimeout(()=>this._write(),500); },
  stop(){ if(this.unsub){ this.unsub(); this.unsub=null; } this.enabled=false; localStorage.removeItem(ON_KEY); this.setStatus('off','停止中'); }
};
function nowHM(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
// 容量の大きい面接音声(base64)は同期対象から除外（Firestoreの1MB制限・容量超過を回避）。音声は録音した端末内にのみ保存。
function stripForCloud(s){
  const clone=JSON.parse(JSON.stringify(s));
  (clone.companies||[]).forEach(c=>(c.interviews||[]).forEach(v=>{ if(v.audioData) v.audioData=''; }));
  return clone;
}
function applyRemoteState(obj){
  // 受信データには音声が含まれないため、この端末に保存済みの音声を引き継ぐ
  const localAudio={};
  (state.companies||[]).forEach(c=>(c.interviews||[]).forEach(v=>{ if(v.audioData) localAudio[v.id]=v.audioData; }));
  state=migrate(obj);
  (state.companies||[]).forEach(c=>(c.interviews||[]).forEach(v=>{ if(!v.audioData && localAudio[v.id]) v.audioData=localAudio[v.id]; }));
  Store.save(state); // ローカルキャッシュのみ更新（クラウドへは書き戻さない）
  if(ui.tab==='detail' && !findCompany(ui.detailId)) ui.tab='B';
  if(ui.pcDayDk && currentLayout==='pc') showDayInline(ui.pcDayDk);
  refreshAfterChange(); updateAsub();
}

/* ---------- state ---------- */
const DEFAULT_STATUS=['未着手','ES','Webテスト','テストセンター','一次面接','二次面接','三次面接','GD','インターン確定','内定'];
const DEFAULT_RESULT=['結果待ち','書類落ち','一次面接落ち','二次面接落ち','三次面接落ち','GD落ち','インターン蹴り','内定蹴り'];
const DEFAULT_IND=['IT・通信','メーカー','商社','金融','コンサル','広告・マスコミ','人材・サービス','小売・流通','建設・不動産','医療・製薬','公務員・団体','その他'];
const DEFAULT_GENRE=['企業志望理由','業種志望理由','ガクチカ','研究','アルバイト','インターン','強み弱み','その他'];

let state={
  companies:[],
  settings:{ weekStart:'sun', layoutMode:'auto', statusOptions:[...DEFAULT_STATUS], resultOptions:[...DEFAULT_RESULT], industries:[...DEFAULT_IND], genres:[...DEFAULT_GENRE], optionColors:{statusOptions:{},resultOptions:{},industries:{},genres:{}} },
  ui:{}
};
const ui={ // transient, not persisted
  tab:'A', calYear:new Date().getFullYear(), calMonth:new Date().getMonth(),
  detailId:null, listTrack:'main', detailTrack:'main',
  taskSort:'all', coSort:'aiueo', filterAsp:[], filterStatus:[], coSearch:'', coSearchOpen:false,
  cTab:'es', esSort:'all', esPass:'all', esCompanies:[], esGenres:[], ivSort:'company', ivCompanies:[], pcDayDk:null
};

/* ---------- status color ---------- */
// 選べる色（既存の6色）。初期設定=null は自動ルールに従う
const COLOR_CHOICES=[
  {k:'green', label:'緑'},
  {k:'pink',  label:'ピンク'},
  {k:'red',   label:'赤'},
  {k:'yellow',label:'黄'},
  {k:'blue',  label:'青'},
  {k:'muted', label:'グレー'},
];
// ユーザーが指定したカスタム色を返す（未指定なら null）
function customColor(key,val){
  const m=state.settings.optionColors&&state.settings.optionColors[key];
  return (m&&val&&m[val])||null;
}
function statusClass(s){
  const cc=customColor('statusOptions',s); if(cc) return cc;
  if(!s||s==='未着手') return 'muted';
  if(s==='インターン確定'||s==='内定') return 'pink';
  return 'green';
}
function isResult(r){ return r&&r!=='' ; }
function resultClass(r){
  const cc=customColor('resultOptions',r); if(cc) return cc;
  if(!r) return 'muted'; if(r==='結果待ち') return 'yellow'; if(r==='準備中') return 'blue'; return 'red';
}
function zenkakuLen(s){ let n=0; for(const ch of (s||'')){ n += /[\x00-\xFF\uFF61-\uFF9F]/.test(ch)?0.5:1; } return n; }
function fmtLen(n){ return (n%1===0)? String(n) : String(n.toFixed(1)); }
function aspStars(n){ n=n||0; return '★'.repeat(n)+'<span style="color:var(--line)">'+'★'.repeat(5-n)+'</span>'; }

/* ---------- date utils ---------- */
function dkey(dt){ // accepts 'YYYY-MM-DDTHH:mm' or 'YYYY-MM-DD' or Date
  if(dt instanceof Date){ return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }
  return (dt||'').slice(0,10);
}
function todayKey(){ return dkey(new Date()); }
function fmtJ(dtStr){ // 'YYYY-MM-DDTHH:mm' -> 'M/D HH:mm' or 'M/D'
  if(!dtStr) return '';
  const d=dtStr.slice(0,10).split('-'); const t=dtStr.slice(11,16);
  let s=parseInt(d[1])+'/'+parseInt(d[2]);
  if(t) s+=' '+t;
  return s;
}
function fmtDateOnly(dtStr){ if(!dtStr)return''; const d=dtStr.slice(0,10).split('-'); return parseInt(d[1])+'/'+parseInt(d[2]); }
function daysBetween(aKey,bKey){ // inclusive list of date keys
  const out=[]; const a=new Date(aKey+'T00:00'); const b=new Date(bKey+'T00:00');
  if(a>b) return [aKey];
  for(let d=new Date(a); d<=b; d.setDate(d.getDate()+1)) out.push(dkey(d));
  return out;
}
function diffDays(aKey,bKey){ return Math.round((new Date(bKey)-new Date(aKey))/86400000); }

/* ---------- task aggregation ---------- */
function allTasks(){
  const out=[];
  state.companies.forEach(c=> (c.tasks||[]).forEach(t=> out.push({...t, companyId:c.id, companyName:c.name})));
  return out;
}
function findCompany(id){ return state.companies.find(c=>c.id===id); }

/* =========================================================
   SCREEN A — 直近のタスク
========================================================= */
function renderA(){ renderCalendar(); renderTaskLists(); }

function renderCalendar(){
  const mount=$('#cal-mount');
  const y=ui.calYear, m=ui.calMonth;
  const weekStart = state.settings.weekStart==='mon'?1:0;
  const first=new Date(y,m,1);
  const startOffset=(first.getDay()-weekStart+7)%7;
  const daysInMonth=new Date(y,m+1,0).getDate();
  const gridStart=new Date(y,m,1-startOffset);
  const tk=todayKey();

  // グリッドの日付キー
  const gridKeys=[];
  for(let i=0;i<42;i++){ const d=new Date(gridStart); d.setDate(gridStart.getDate()+i); gridKeys.push(dkey(d)); }
  const idxOf={}; gridKeys.forEach((k,i)=>{ if(idxOf[k]==null) idxOf[k]=i; });
  const g0=gridKeys[0], g41=gridKeys[41];

  // 単日（点）と複数日（バー）に振り分け
  const tasks=allTasks();
  const pointMap={}; // idx -> [{name,done,ev}]
  const spanItems=[]; // {name,done,ev,a,b,sKey,eKey}
  tasks.forEach(t=>{
    if(!t.end) return;
    const endK=dkey(t.end);
    if(!t.start){
      const i=idxOf[endK]; if(i!=null)(pointMap[i]=pointMap[i]||[]).push({name:t.name,done:t.done,ev:t.type==='event'});
      return;
    }
    let sKey=dkey(t.start), eKey=endK; if(sKey>eKey){ const tmp=sKey; sKey=eKey; eKey=tmp; }
    if(eKey<g0 || sKey>g41) return; // 表示範囲外
    let a = (sKey<g0)?0:idxOf[sKey];
    let b = (eKey>g41)?41:idxOf[eKey];
    if(a==null) a=0; if(b==null) b=41;
    spanItems.push({name:t.name,done:t.done,ev:t.type==='event',a,b,sKey,eKey});
  });
  // レーン（段）割り当て：開始が早い順・長い順に詰める
  spanItems.sort((x,y)=> x.a-y.a || (y.b-y.a)-(x.b-x.a));
  const laneEnd=[];
  spanItems.forEach(s=>{ let lane=0; while(lane<laneEnd.length && laneEnd[lane]>=s.a) lane++; s.lane=lane; laneEnd[lane]=s.b; });
  const spanAt=(i,lane)=> spanItems.find(s=>s.lane===lane && i>=s.a && i<=s.b);
  // 行ごとに必要な段数だけ確保（バーの無い行は上から詰める）
  const rowLanes=[];
  for(let r=0;r<6;r++){ let mx=-1; spanItems.forEach(s=>{ if(s.b>=r*7 && s.a<=r*7+6) mx=Math.max(mx,s.lane); }); rowLanes[r]=Math.min(mx+1,3); }

  let cells='';
  for(let i=0;i<42;i++){
    const d=new Date(gridStart); d.setDate(gridStart.getDate()+i);
    const dk=gridKeys[i];
    const out = d.getMonth()!==m;
    const dow=d.getDay();
    const row=Math.floor(i/7);
    const SL=rowLanes[row];
    const POINT_CAP=Math.max(0,3-SL);
    const cls=['cal-cell']; if(out)cls.push('out'); if(dk===tk)cls.push('today');
    if(dow===0)cls.push('sun'); if(dow===6)cls.push('sat');
    let evHtml=''; let hidden=0;
    // バー（レーン固定）
    for(let lane=0; lane<SL; lane++){
      const s=spanAt(i,lane);
      if(!s){ evHtml+=`<div class="cal-lane-empty"></div>`; continue; }
      const trueStart = dk===s.sKey, trueEnd = dk===s.eKey;
      const showLabel = trueStart || dow===weekStart;
      const c=['cal-ev','span']; if(trueStart)c.push('s'); if(trueEnd)c.push('e'); if(s.done)c.push('done'); if(s.ev)c.push('event');
      let style='';
      if(showLabel){
        const rowLastIdx=row*7+6;
        const cols=Math.min(rowLastIdx, s.b) - i + 1; // この週内で続く日数
        if(cols>1) c.push('label-span'); // 文字を隣のマスへあふれさせて表示
      }
      evHtml+=`<div class="${c.join(' ')}"${style} title="${esc(s.name)}">${showLabel?esc(s.name):'&nbsp;'}</div>`;
    }
    spanItems.forEach(s=>{ if(s.lane>=SL && i>=s.a && i<=s.b) hidden++; });
    // 点（単日）
    const pts=pointMap[i]||[];
    pts.slice(0,POINT_CAP).forEach(p=>{ evHtml+=`<div class="cal-ev point ${p.done?'done':''} ${p.ev?'event':''}" title="${esc(p.name)}">${esc(p.name)}</div>`; });
    hidden += Math.max(0, pts.length-POINT_CAP);
    if(hidden>0) evHtml+=`<div class="cal-more">+${hidden}</div>`;
    cells+=`<div class="${cls.join(' ')}" data-dk="${dk}"><div class="dnum">${d.getDate()}</div>${evHtml}</div>`;
  }

  let wd='';
  for(let i=0;i<7;i++){ const idx=(weekStart+i)%7; const c=idx===0?'sun':idx===6?'sat':''; wd+=`<div class="cal-wd ${c}">${WD[idx]}</div>`; }

  mount.innerHTML=`
    <div class="cal-card">
      <div class="cal-head">
        <button class="cal-nav" id="cal-prev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <button class="cal-ym" id="cal-pick"><span class="yr">${y}年</span>${m+1}月</button>
        <button class="cal-nav" id="cal-next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
      </div>
      <div class="cal-grid">${wd}${cells}</div>
    </div>`;
  $('#cal-prev').onclick=()=>{ ui.calMonth--; if(ui.calMonth<0){ui.calMonth=11;ui.calYear--;} renderCalendar(); updateAsub(); };
  $('#cal-next').onclick=()=>{ ui.calMonth++; if(ui.calMonth>11){ui.calMonth=0;ui.calYear++;} renderCalendar(); updateAsub(); };
  $('#cal-pick').onclick=openYMPicker;
  $$('#cal-mount .cal-cell').forEach(cell=> cell.onclick=()=>openDayPopup(cell.dataset.dk));
}

/* その日のタスク一覧（締切のみ＝当日 / 期間あり＝期間に含まれる日） */
function tasksOnDay(dk){
  const out=[];
  allTasks().forEach(t=>{
    if(!t.end) return;
    const endK=dkey(t.end);
    if(t.start){ const sK=dkey(t.start), a=sK<=endK?sK:endK, b=sK<=endK?endK:sK; if(dk>=a&&dk<=b) out.push(t); }
    else if(endK===dk){ out.push(t); }
  });
  return out.sort((a,b)=>(a.end||'').localeCompare(b.end||''));
}
function fmtDayTitle(dk){
  const p=dk.split('-'); const d=new Date(+p[0],+p[1]-1,+p[2]);
  return `${+p[1]}月${+p[2]}日（${WD[d.getDay()]}）`;
}
function dayDetailBody(dk){
  const items=tasksOnDay(dk);
  if(!items.length){
    return {items, body:`<div class="empty" style="padding:26px 10px"><span class="em">🗓️</span>この日のタスクはありません</div>`};
  }
  const body=`<div class="day-tasks">`+items.map(t=>{
    const isEv=t.type==='event';
    const due = t.start? `期間 ${fmtJ(t.start)} 〜 ${fmtJ(t.end)}` : (isEv? `${fmtJ(t.end)}` : `期限 ${fmtJ(t.end)}`);
    const overdue = !isEv && !t.done && dkey(t.end) < todayKey();
    return `<div class="day-task ${t.done?'done':''}">
      <button class="dt-task" data-co="${t.companyId}" data-tid="${t.id}">
        <div class="dt-name">${isEv?'<span class="tflag ev">予定</span> ':(t.done?'✓ ':'')}${esc(t.name)}</div>
        <div class="dt-due ${overdue?'over':''}">${due}</div>
        ${t.memo?`<div class="dt-memo">${esc(t.memo)}</div>`:''}
      </button>
      <button class="dt-co" data-co="${t.companyId}" title="${esc(t.companyName)}のページを開く">
        <span class="dt-dot"></span><span class="dt-coname">${esc(t.companyName)}</span>
        <svg class="dt-cochev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>`;
  }).join('')+`</div>`;
  return {items, body};
}

function renderTaskLists(){
  const sortSel=$('#task-sort');
  const cos=state.companies;
  sortSel.innerHTML=`<option value="all">すべての企業</option>`+cos.map(c=>`<option value="${c.id}" ${ui.taskSort===c.id?'selected':''}>${esc(c.name)}</option>`).join('');
  sortSel.value=ui.taskSort;
  sortSel.onchange=()=>{ ui.taskSort=sortSel.value; renderTaskLists(); };

  let tasks=allTasks();
  if(ui.taskSort!=='all') tasks=tasks.filter(t=>t.companyId===ui.taskSort);
  const events=tasks.filter(t=>t.type==='event' && !t.done).sort((a,b)=> (a.start||a.end||'').localeCompare(b.start||b.end||''));
  const active=tasks.filter(t=>t.type!=='event' && !t.done).sort((a,b)=> (a.end||'').localeCompare(b.end||''));
  const done=tasks.filter(t=>t.done).sort((a,b)=> (b.end||'').localeCompare(a.end||''));

  $('#event-count').textContent=events.length?`${events.length}件`:'';
  $('#task-count').textContent=active.length?`${active.length}件`:'';
  $('#done-count').textContent=done.length?`${done.length}件`:'';

  $('#event-list').innerHTML = events.length? events.map(eventRow).join('') : `<div class="empty" style="padding:14px"><span style="font-size:12px">予定はありません</span></div>`;
  $('#task-list').innerHTML = active.length? active.map(taskRow).join('') : `<div class="empty"><span class="em">🗒️</span>未完了のタスクはありません<br><span style="font-size:12px">企業の詳細ページから追加できます</span></div>`;
  $('#done-list').innerHTML = done.length? done.map(taskRow).join('') : `<div class="empty" style="padding:16px"><span style="font-size:12px">完了したタスクがここに移動します</span></div>`;

  $$('#task-list .task,#done-list .task').forEach(node=>{
    const cid=node.dataset.co, tid=node.dataset.tid;
    const cb=$('.cb',node); if(cb) cb.onclick=(e)=>{ e.stopPropagation(); toggleTask(cid,tid); };
    const eb=$('.editbtn',node); if(eb) eb.onclick=(e)=>{ e.stopPropagation(); taskForm(cid,tid); };
    const chip=$('.co-chip',node); if(chip) chip.onclick=(e)=>{ e.stopPropagation(); openDetail(cid); };
  });
  $$('#event-list .task').forEach(node=>{
    const cid=node.dataset.co, tid=node.dataset.tid;
    const eb=$('.editbtn',node); if(eb) eb.onclick=(e)=>{ e.stopPropagation(); taskForm(cid,tid); };
    const chip=$('.co-chip',node); if(chip) chip.onclick=(e)=>{ e.stopPropagation(); openDetail(cid); };
    node.onclick=()=>taskForm(cid,tid);
  });
}
function coChip(t){
  return `<button class="co-chip" data-co="${t.companyId}" title="${esc(t.companyName)}のページを開く"><span class="dt-dot"></span><span class="cc-name">${esc(t.companyName)}</span><svg class="dt-cochev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>`;
}
function taskRow(t){
  const near = !t.done && t.end && diffDays(todayKey(),dkey(t.end))<=2 && diffDays(todayKey(),dkey(t.end))>=0;
  const dueTxt = t.start? `${fmtJ(t.start)} 〜 ${fmtJ(t.end)}` : `期限 ${fmtJ(t.end)}`;
  return `<div class="task ${t.done?'checked':''}" data-co="${t.companyId}" data-tid="${t.id}">
    <button class="cb ${t.done?'on':''}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></button>
    <div class="body">
      <div class="tname">${esc(t.name)}</div>
      <div class="meta"><span class="${near?'due-near':''}">${dueTxt}</span></div>
      ${t.memo?`<div class="t-memo">${esc(t.memo)}</div>`:''}
      ${coChip(t)}
    </div>
    <button class="editbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
  </div>`;
}
function eventRow(t){
  const dateTxt = t.start? `${fmtJ(t.start)} 〜 ${fmtJ(t.end)}` : `${fmtJ(t.end)}`;
  return `<div class="task is-event" data-co="${t.companyId}" data-tid="${t.id}">
    <span class="ev-mark" aria-hidden="true">📌</span>
    <div class="body">
      <div class="tname">${esc(t.name)}</div>
      <div class="meta"><span class="ev-date">${dateTxt}</span></div>
      ${t.memo?`<div class="t-memo">${esc(t.memo)}</div>`:''}
      ${coChip(t)}
    </div>
    <button class="editbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
  </div>`;
}
function toggleTask(cid,tid){
  const c=findCompany(cid); if(!c)return; const t=(c.tasks||[]).find(x=>x.id===tid); if(!t)return;
  t.done=!t.done; persist();
  if(ui.tab==='A') renderTaskLists();

function renderCompanyList(){
  const mount=$('#company-list');
  let list=[...state.companies];
  // filter
  if(ui.filterAsp.length) list=list.filter(c=> ui.filterAsp.includes(c.aspiration));
  if(ui.filterStatus.length) list=list.filter(c=> ui.filterStatus.includes((c.tracks[ui.listTrack]||{}).status||'未着手'));
  // 企業名で検索
  const q=(ui.coSearch||'').trim().toLowerCase();
  if(q) list=list.filter(c=> (c.name||'').toLowerCase().includes(q));
  // sort
  if(ui.coSort==='asp') list.sort((a,b)=> (b.aspiration||0)-(a.aspiration||0) || a.name.localeCompare(b.name,'ja'));
  else if(ui.coSort==='status'){
    const ord=s=>{ const i=state.settings.statusOptions.indexOf(s||'未着手'); return i<0?-1:i; };
    const waiting=t=> (t.result==='結果待ち')?0:1; // 結果待ちを先に
    list.sort((a,b)=>{
      const ta=a.tracks[ui.listTrack]||{}, tb=b.tracks[ui.listTrack]||{};
      return ord(tb.status)-ord(ta.status) || waiting(ta)-waiting(tb) || (b.aspiration||0)-(a.aspiration||0) || a.name.localeCompare(b.name,'ja');
    });
  }
  else list.sort((a,b)=> a.name.localeCompare(b.name,'ja'));

  $('#co-num').textContent = `${list.length}社`;

  if(!state.companies.length){ mount.innerHTML=`<div class="empty"><span class="em">🏢</span>まだ企業が登録されていません<br><span style="font-size:12px">下のボタンから最初の企業を追加しましょう</span></div>`; return; }
  if(!list.length){ mount.innerHTML = q
      ? `<div class="empty"><span class="em">🔍</span>「${esc(ui.coSearch.trim())}」に一致する企業がありません</div>`
      : `<div class="empty"><span class="em">🔍</span>条件に合う企業がありません</div>`; return; }

  mount.innerHTML=list.map(c=>{
    const tr=c.tracks[ui.listTrack]||{status:'未着手',result:''};
    const stCls=statusClass(tr.status);
    const resultBadge = isResult(tr.result)? `<span class="badge ${resultClass(tr.result)}">${esc(tr.result)}</span>`:'';
    return `<div class="co-card" data-id="${c.id}">
      <div class="co-top">
        <div class="co-name">${esc(c.name)}</div>
        <div class="co-asp">${aspStars(c.aspiration)}</div>
      </div>
      <div class="co-meta">
        ${c.industry?`<span class="badge ${customColor('industries',c.industry)||'ind'}">${esc(c.industry)}</span>`:''}
        <span class="badge ${stCls}">${esc(tr.status||'未着手')}</span>
        ${resultBadge}
      </div>
      <div class="co-mypage">
        <span class="lbl">マイページID</span>
        <span class="val">${c.myPageId?esc(c.myPageId):'<span style="color:var(--ink-faint)">未登録</span>'}</span>
        ${c.myPageId?`<button class="copybtn" data-copy="${esc(c.myPageId)}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>コピー</button>`:''}
      </div>

  $$('#company-list .co-card').forEach(node=>{

  });
}

/* ---------- iCalendar (.ics) export ---------- */
const REMIND_OPTS=[['none','なし'],['PT1H','1時間前'],['PT3H','3時間前'],['P1D','1日前'],['P3D','3日前'],['P1W','1週間前']];
function icsEsc(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\r?\n/g,'\\n'); }
function icsLocal(s){ if(!s) return ''; const t=s.replace(/[-:]/g,''); return t.length===13? t+'00' : t; }
function icsAddMin(s,min){ const a=s.split('T'); const dp=a[0].split('-').map(Number); const tp=a[1].split(':').map(Number); const dt=new Date(dp[0],dp[1]-1,dp[2],tp[0],tp[1]+min); const p=n=>String(n).padStart(2,'0'); return ''+dt.getFullYear()+p(dt.getMonth()+1)+p(dt.getDate())+'T'+p(dt.getHours())+p(dt.getMinutes())+'00'; }
function icsStamp(){ return new Date().toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,''); }
function buildTaskICS(t,companyName){
  let dtstart,dtend,relEnd;
  if(t.start){ dtstart=icsLocal(t.start); dtend=icsLocal(t.end); relEnd=true; }
  else { dtstart=icsLocal(t.end); dtend=icsAddMin(t.end,30); relEnd=false; }
  const L=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//shukatsu-techo//JP','CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT',
    'UID:'+((t.id||uid())+'@shukatsu-techo'),
    'DTSTAMP:'+icsStamp(),
    'DTSTART:'+dtstart,
    'DTEND:'+dtend,
    'SUMMARY:'+icsEsc((companyName?('【'+companyName+'】'):'')+t.name),
    'DESCRIPTION:'+icsEsc('就活手帳'+(companyName?(' / '+companyName):''))];
  if(t.reminder && t.reminder!=='none'){
    L.push('BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:'+icsEsc(t.name),
      (relEnd?'TRIGGER;RELATED=END:-':'TRIGGER:-')+t.reminder,'END:VALARM');
  }
  L.push('END:VEVENT','END:VCALENDAR');
  return L.join('\r\n');
}
function downloadICS(filename,text){
  const isiOS=/iP(hone|od|ad)/.test(navigator.userAgent) || (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  if(isiOS){ window.location.href='data:text/calendar;charset=utf-8,'+encodeURIComponent(text); return; }
  try{
    const blob=new Blob([text],{type:'text/calendar;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
  }catch(e){ window.location.href='data:text/calendar;charset=utf-8,'+encodeURIComponent(text); }
}

      <div class="fld"><label>リマインド（通知）</label><div class="selwrap"><select id="tf-remind">${remindOpts}</select></div><div class="hint">「カレンダーに追加」で書き出した予定に通知が設定されます。終了日時が基準です。</div></div>

    </div>`);

}

/* 面接の通過可否：新形式 passStatus('pass'/'wait'/'fail') と旧形式 passed(真偽) の両対応 */

/* ESの通過可否も面接と同様に3状態。初期設定は「通過待ち」(wait) */

const IV_PASS_LABEL={pass:'✓ 通過',wait:'通過待ち',fail:'✕ 未通過'};
const IV_PASS_CLASS={pass:'pass-y',wait:'pass-w',fail:'pass-n'};
function ivCard(v,cid,withCompany){

function bindRecordCards(root,cid){

function toggleClamp(node,e){ e.stopPropagation(); const b=$('.rbody',node); const btn=$('.expand',node); const cl=b.classList.toggle('clamp'); btn.textContent=cl?'全文を表示':'閉じる'; }

    if(isEdit) Object.assign(e,data);

    persist(); closeModal(); toast(isEdit?'保存しました':'ESを追加しました'); refreshAfterChange();

  if(isEdit) $('#ef-del').onclick=()=>{ c.es=c.es.filter(x=>x.id!==id); persist(); closeModal(); toast('削除しました'); refreshAfterChange(); };

function cGroup(title,items,kind){

  return `<div class="section-h" style="margin-top:10px"><span class="dot"></span>${esc(title)}<span class="count">${items.length}件</span></div>${body}`;
}

   shared option editor & settings

function rebuildSelect(sel,opts,selectVal,addVal,addLabel){
  const node=$(sel); if(!node)return;
  node.innerHTML=opts.map(o=>`<option value="${esc(o)}" ${o===selectVal?'selected':''}>${esc(o)}</option>`).join('')+(addVal?`<option value="${addVal}">${esc(addLabel)}</option>`:'');
  node.value=selectVal;
}
function addOptionModal(title,settingsKey,onAdd){
  const cur=state.settings[settingsKey];
  // open a small secondary modal on top
  const bg=el(`<div class="modal-bg show" style="z-index:70"><div class="modal" style="max-width:480px"></div></div>`);
  const m=$('.modal',bg);
  const ARU='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>';
  const ARD='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
  const hasColor=['statusOptions','resultOptions','industries','genres'].includes(settingsKey);
  const swDot=(k)=>`<span class="sw" style="background:var(--${k}-bg);border-color:var(--${k})"></span>`;
  const swHTML=(o)=>{
    const cc=customColor(settingsKey,o);
    if(cc) return swDot(cc);                                  // ユーザーが指定した色
    if(DEFAULT_LOCK(settingsKey,o)){                          // 初期設定のプリセット項目 → 既定色を表示
      if(settingsKey==='statusOptions') return swDot(statusClass(o));
      if(settingsKey==='resultOptions') return swDot(resultClass(o));
      if(settingsKey==='industries') return `<span class="sw" style="background:var(--surface-2);border-color:var(--line)"></span>`;
      if(settingsKey==='genres') return `<span class="sw" style="background:var(--navy);border-color:var(--navy)"></span>`;
    }
    return `<span class="sw auto"></span>`;                   // 新規追加の項目（色未指定）→ レインボー
  };
  const rowsHTML=()=> cur.map((o,i)=>`<div class="o">
      ${hasColor?`<button class="clr" data-act="clr" data-i="${i}" aria-label="色を選ぶ">${swHTML(o)}</button>`:''}
      <span class="nm">${esc(o)}</span>
      <button class="mv" data-act="up" data-i="${i}" ${i===0?'disabled':''} aria-label="上へ">${ARU}</button>
      <button class="mv" data-act="dn" data-i="${i}" ${i===cur.length-1?'disabled':''} aria-label="下へ">${ARD}</button>
      ${DEFAULT_LOCK(settingsKey,o)?'':`<button class="del" data-act="del" data-i="${i}" aria-label="削除">×</button>`}
    </div>`).join('');
  m.innerHTML=`
    <div class="modal-grab"></div>
    <div class="modal-h"><div class="mt">${esc(title)}</div><button class="modal-x" id="ao-close">閉じる</button></div>
    <div class="modal-body">
      <div class="inline-add"><input type="text" id="ao-input" placeholder="新しい項目名"><button id="ao-add">追加</button></div>
      <div class="optlist" id="ao-list">${rowsHTML()}</div>
      <div class="hint">▲▼で表示順を並び替えできます。追加した項目はすべての企業で選べます。</div>
    </div>`;
  document.body.appendChild(bg);
  const close=()=>bg.remove();
  $('#ao-close',m).onclick=close;
  bg.addEventListener('click',e=>{ if(e.target===bg) close(); });
  const inp=$('#ao-input',m);
  const doAdd=()=>{ const v=inp.value.trim(); if(!v)return; if(cur.includes(v)){toast('すでに存在します');return;} cur.push(v); persist(); inp.value=''; redraw(); if(onAdd)onAdd(v); };
  $('#ao-add',m).onclick=doAdd;
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter')doAdd(); });
  function redraw(){ $('#ao-list',m).innerHTML=rowsHTML(); bindRows(); }
  function bindRows(){
    $$('#ao-list .o button',m).forEach(b=> b.onclick=()=>{
      const i=+b.dataset.i, act=b.dataset.act;
      if(act==='clr'){ pickColorModal(settingsKey,cur[i],()=>redraw()); return; }
      if(act==='up'&&i>0){ const t=cur[i-1]; cur[i-1]=cur[i]; cur[i]=t; }
      else if(act==='dn'&&i<cur.length-1){ const t=cur[i+1]; cur[i+1]=cur[i]; cur[i]=t; }
      else if(act==='del'){ cur.splice(i,1); }
      else return;
      persist(); redraw();
    });
  }
  bindRows();
}
function pickColorModal(settingsKey,val,onDone){
  const cur=customColor(settingsKey,val); // 現在の指定（null=初期設定）
  const bg=el(`<div class="modal-bg show" style="z-index:80"><div class="modal" style="max-width:360px"></div></div>`);
  const m=$('.modal',bg);
  const co=(k,label,extra)=>`<button class="co ${(k===cur||(k===''&&!cur))?'on':''}" data-k="${k}"><span class="sw ${extra||''}" ${k?`style="background:var(--${k}-bg);border-color:var(--${k})"`:''}>${(k===cur||(k===''&&!cur))?'✓':''}</span>${label}</button>`;
  m.innerHTML=`
    <div class="modal-grab"></div>
    <div class="modal-h"><div class="mt">色を選ぶ</div><button class="modal-x" id="pc-close">閉じる</button></div>
    <div class="modal-body">
      <div style="font-size:13px;font-weight:700;color:var(--ink-soft);margin-bottom:4px">「${esc(val)}」の色</div>
      <div class="clr-picker">
        ${co('','初期設定','auto chk')}
        ${COLOR_CHOICES.map(c=>co(c.k,c.label)).join('')}
      </div>
      <div class="hint">「初期設定」を選ぶと、アプリの自動ルールに従います。</div>
    </div>`;
  document.body.appendChild(bg);
  const close=()=>bg.remove();
  $('#pc-close',m).onclick=close;
  bg.addEventListener('click',e=>{ if(e.target===bg) close(); });
  $$('.clr-picker .co',m).forEach(b=> b.onclick=()=>{
    const k=b.dataset.k;
    state.settings.optionColors[settingsKey]=state.settings.optionColors[settingsKey]||{};
    if(k) state.settings.optionColors[settingsKey][val]=k;
    else delete state.settings.optionColors[settingsKey][val];
    persist(); close(); if(onDone)onDone();
    refreshAfterChange();
  });
}
function DEFAULT_LOCK(key,val){
  const locks={ statusOptions:DEFAULT_STATUS, resultOptions:DEFAULT_RESULT, industries:DEFAULT_IND, genres:DEFAULT_GENRE };
  return (locks[key]||[]).includes(val);
}

        </div>

      </div>
      <div class="divider"></div>
      <div class="fld"><label>文字サイズ</label>
        <div class="seg" id="set-font" style="width:100%">
          <button data-fs="s" class="${state.settings.fontSize==='s'?'on':''}" style="flex:1">小</button>
          <button data-fs="m" class="${(state.settings.fontSize||'m')==='m'?'on':''}" style="flex:1">中</button>
          <button data-fs="l" class="${state.settings.fontSize==='l'?'on':''}" style="flex:1">大</button>
        </div>
        <div class="hint">アプリ全体の文字の大きさを変えられます（初期設定は「中」）。</div>
      </div>
      <div class="divider"></div>
      <div class="fld"><label>項目の編集</label>
        <button class="add-sm" id="set-status" style="margin-top:0">選考状況の選択肢を編集</button>
        <button class="add-sm" id="set-result">選考結果の選択肢を編集</button>
        <button class="add-sm" id="set-genre">ESジャンルの選択肢を編集</button>
        <button class="add-sm" id="set-ind">業種の選択肢を編集</button>
      </div>
      <div class="divider"></div>
      <div class="fld"><label>クラウド同期（iPhoneとPCで共有）</label>
        <div class="cloud-row"><span class="cloud-status ${Cloud.status}" id="cloud-status">${esc(Cloud.statusMsg)}</span></div>
        <button class="add-sm" id="set-cloud" style="margin-top:8px">クラウド同期の設定…</button>
        <div class="hint">Firebaseの無料データベースを使って、複数の端末でリアルタイムに同期できます。初回のみFirebaseのWeb設定と合言葉コードの入力が必要です。</div>

  $('#modal-bg .modal').classList.add('fixedsize');
  $$('#set-week button').forEach(b=> b.onclick=()=>{ state.settings.weekStart=b.dataset.w; persist(); $$('#set-week button').forEach(x=>x.classList.toggle('on',x===b)); renderCalendar(); });
  $$('#set-layout button').forEach(b=> b.onclick=()=>{ state.settings.layoutMode=b.dataset.l; persist(); $$('#set-layout button').forEach(x=>x.classList.toggle('on',x===b)); applyLayout(true); });

  $('#set-genre').onclick=()=>addOptionModal('ESジャンルの選択肢','genres',()=>{});
  $('#set-ind').onclick=()=>addOptionModal('業種の選択肢','industries',()=>{});

function cloudModal(){
  const cfg=Cloud.cfg(), code=Cloud.code();
  const cfgText = cfg? JSON.stringify(cfg,null,2) : '';
  openModal(`
    <div class="modal-h"><div class="mt">クラウド同期の設定</div><button class="modal-x" data-close>閉じる</button></div>
    <div class="modal-body">
      <div class="cloud-row" style="margin-bottom:10px"><span class="cloud-status ${Cloud.status}" id="cloud-status">${esc(Cloud.statusMsg)}</span></div>
      <div class="fld"><label>① Firebase の設定（firebaseConfig）</label>
        <textarea id="cl-cfg" style="min-height:150px;font-family:monospace;font-size:12px" placeholder='{\n  "apiKey": "...",\n  "authDomain": "...",\n  "projectId": "...",\n  "appId": "..."\n}'>${esc(cfgText)}</textarea>
        <div class="hint">Firebaseコンソールで作成したWebアプリの設定オブジェクト（{ } の中身ごと）を貼り付けます。</div>
      </div>
      <div class="fld"><label>② 同期の合言葉コード（全端末で同じ値にする）</label>
        <div class="inline-add"><input type="text" id="cl-code" value="${esc(code)}" placeholder="例: shukatsu-9f3kd72a"><button id="cl-gen">生成</button></div>
        <div class="hint">このコードを知っている端末同士でデータを共有します。第三者に推測されない長めの文字列にしてください。</div>
      </div>
      <div class="cl-actions">
        <button class="btn-primary" id="cl-connect">接続して同期を開始</button>
        ${Cloud.enabled?'<button class="add-sm" id="cl-stop" style="margin-top:8px;color:var(--red)">同期を停止する</button>':''}
      </div>
      <div class="divider"></div>
      <details class="cl-help"><summary>設定手順（初回のみ）</summary>
        <ol>
          <li><a href="https://console.firebase.google.com/" target="_blank" rel="noopener">Firebaseコンソール</a>でプロジェクトを作成</li>
          <li>「ビルド」→「Firestore Database」を作成（本番モードで可）</li>
          <li>「ビルド」→「Authentication」→「ログイン方法」で<b>匿名</b>を有効化</li>
          <li>プロジェクト設定→「マイアプリ」でWebアプリ（&lt;/&gt;）を追加し、表示される <code>firebaseConfig</code> の { } 部分を上の①に貼り付け</li>
          <li>Firestoreの「ルール」を下記に設定して公開：</li>
        </ol>
        <pre class="cl-rules">rules_version = '2';
service cloud.firestore {
  match /databases/{db}/documents {
    match /shukatsu/{code} {
      allow read, write: if request.auth != null;
    }
  }
}</pre>
        <div class="hint">②の合言葉コードを共有の鍵として使います。コードを知らない人はデータにアクセスできません（ルールで認証必須）。同時編集には対応しておらず、後から保存した内容で上書きされます。</div>
      </details>
    </div>`);
  $('#cl-gen').onclick=()=>{ $('#cl-code').value='shukatsu-'+Math.random().toString(36).slice(2,10)+Math.random().toString(36).slice(2,6); };
  $('#cl-stop') && ($('#cl-stop').onclick=()=>{ Cloud.stop(); toast('同期を停止しました'); cloudModal(); });
  $('#cl-connect').onclick=async ()=>{
    let cfgObj=null; const raw=$('#cl-cfg').value.trim(); const codeVal=$('#cl-code').value.trim();
    if(!raw){ toast('Firebaseの設定を入力してください'); return; }
    if(!codeVal){ toast('合言葉コードを入力してください'); return; }
    try{ cfgObj=JSON.parse(raw); }catch(e){ try{ cfgObj=(new Function('return ('+raw+')'))(); }catch(e2){ toast('設定の形式が正しくありません'); return; } }
    if(!cfgObj||!cfgObj.projectId||!cfgObj.apiKey){ toast('projectId/apiKey が見つかりません'); return; }
    localStorage.setItem(CFG_KEY, JSON.stringify(cfgObj));
    localStorage.setItem(CODE_KEY, codeVal);
    Cloud.app=null; // 設定変更時は初期化し直す
    Cloud.setStatus('connecting','接続中…');
    await Cloud.start({firstLink:true, toast:true});
  };
}

/* =========================================================
   modal infra / tabs / misc
========================================================= */
function openModal(html){
  const m=$('#modal'); m.innerHTML='<div class="modal-grab"></div>'+html;
  $('#modal-bg').classList.add('show');
  $$('[data-close]',m).forEach(b=> b.onclick=closeModal);
  document.body.style.overflow='hidden';
}
function closeModal(){ $('#modal-bg').classList.remove('show'); document.body.style.overflow=''; }
$('#modal-bg').addEventListener('click',e=>{ if(e.target.id==='modal-bg') closeModal(); });

function copyText(txt,btn,msg){
  const done=()=>{ if(btn){ const o=btn.innerHTML; btn.classList.add('ok'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>済'; setTimeout(()=>{ btn.classList.remove('ok'); btn.innerHTML=o; },1400); } toast(msg||'IDをコピーしました'); };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done).catch(()=>fallback()); } else fallback();
  function fallback(){ const ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} ta.remove(); done(); }
}

function refreshAfterChange(){
  if(ui.tab==='A') renderA();
  else if(ui.tab==='B') renderB();
  else if(ui.tab==='detail') renderDetail();
  else if(ui.tab==='C') renderC();
  // PC版は左カラムのカレンダーを常に最新化
  if(currentLayout==='pc' && ui.tab!=='A') renderCalendar();
  // PC版で日詳細を開いている場合は内容を更新
  if(currentLayout==='pc' && ui.pcDayDk) showDayInline(ui.pcDayDk);
}

/* =========================================================
   layout (スマホ版 / PC版)
========================================================= */
function resolveLayout(){
  const mode=(state.settings&&state.settings.layoutMode)||'auto';
  if(mode==='pc') return 'pc';
  if(mode==='mobile') return 'mobile';
  // auto: 横の方が長ければPC、それ以外はスマホ
  return (window.innerWidth>window.innerHeight && window.innerWidth>=720) ? 'pc' : 'mobile';
}
let currentLayout=null;
function applyFontSize(){
  const fs=(state.settings&&state.settings.fontSize)||'m';
  document.body.classList.remove('fs-s','fs-m','fs-l');
  document.body.classList.add('fs-'+fs);
}
function applyLayout(force){
  const next=resolveLayout();
  if(next===currentLayout && !force) return;
  currentLayout=next;
  const calMount=$('#cal-mount');
  if(next==='pc'){
    document.body.classList.add('pc');
    document.documentElement.style.scrollbarGutter='auto';
    // カレンダーを左カラムの日詳細コンテナの前（上）に配置
    const pcLeft=$('#pc-left'), pcDay=$('#pc-day');
    if(calMount && calMount.parentElement!==pcLeft) pcLeft.insertBefore(calMount, pcDay);
    renderCalendar();
    if(ui.pcDayDk) showDayInline(ui.pcDayDk);
  }else{
    document.body.classList.remove('pc');
    document.documentElement.style.scrollbarGutter='stable';
    closeDayInline();
    // カレンダーをタスク画面へ戻す（topbarの直後）
    const sA=$('#screen-A');
    if(calMount && calMount.parentElement!==sA){ sA.insertBefore(calMount, sA.querySelector('.pad')); }
    renderCalendar();
  }
  syncTabActive(ui.tab);
}
function syncTabActive(tab){
  const t = tab==='detail'?'B':tab;
  $$('#top-tabs .tt-btn').forEach(b=> b.classList.toggle('on', b.dataset.tab===t));
  $$('.tabbar button').forEach(b=> b.classList.toggle('on', b.dataset.tab===t));
}

function switchTab(tab){
  ui.tab=tab;
  $$('.screen').forEach(s=>s.classList.remove('active'));
  const map={A:'screen-A',B:'screen-B',C:'screen-C',detail:'screen-detail'};
  const act=$('#'+map[tab]); act.classList.add('active');
  syncTabActive(tab);
  window.scrollTo(0,0);
  if(act.scrollTop) act.scrollTop=0;
  if(tab==='A'){ renderA(); updateAsub(); }
  else if(tab==='B') renderB();
  else if(tab==='C') renderC();
  else if(tab==='detail') renderDetail();
}

/* =========================================================
   init
========================================================= */
async function init(){
  const loaded=await Store.load();
  if(loaded){
    state=migrate(loaded);
  } else {
    seedDemo();
    state=migrate(state);
    Store.save(state);
  }
  // 既定の表示タブ（インターン/本選考）
  ui.listTrack=ui.detailTrack=state.settings.defaultTrack||'main';
  // 文字サイズ
  applyFontSize();
  // tabbar
  $$('.tabbar button').forEach(b=> b.onclick=()=>switchTab(b.dataset.tab));
  $$('#top-tabs .tt-btn').forEach(b=> b.onclick=()=>switchTab(b.dataset.tab));
  $('#top-settings').onclick=settingsModal;
  $('#btn-settings').onclick=settingsModal;
  $('#btn-add-company').onclick=()=>companyForm(null);
  $('#btn-co-search').onclick=()=>toggleCoSearch();
  $('#B-search-input').oninput=e=>{ ui.coSearch=e.target.value; renderCompanyList(); };
  $('#B-search-clr').onclick=()=>{ ui.coSearch=''; const i=$('#B-search-input'); if(i){ i.value=''; i.focus(); } renderCompanyList(); };
  $('#btn-detail-back').onclick=()=>switchTab('B');
  $('#btn-edit-company').onclick=()=>{ const c=findCompany(ui.detailId); if(c)companyForm(c); };
  $$('#C-tabs button').forEach(b=> b.onclick=()=>{ ui.cTab=b.dataset.ct; renderC(); });
  // 表示モード（自動時は画面比率の変化に追従）
  let rzTimer=null;
  window.addEventListener('resize',()=>{ clearTimeout(rzTimer); rzTimer=setTimeout(()=>{ if((state.settings.layoutMode||'auto')==='auto') applyLayout(); },180); });
  // アプリを閉じる/バックグラウンドにする直前に、未送信の変更をクラウドへ即時保存
  const flush=()=>{ try{ Store.save(state); if(Cloud.enabled) Cloud._write(); }catch(e){} };
  window.addEventListener('pagehide', flush);
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') flush(); });
  switchTab('A'); updateAsub();
  applyLayout(true);
  // 前回クラウド同期を有効にしていれば自動再接続
  if(localStorage.getItem(ON_KEY)==='1' && Cloud.cfg() && Cloud.code()){ Cloud.start({}); }
}
